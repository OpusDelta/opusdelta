name: Δ Transmission

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

jobs:
  transmit:
    name: Generate Signal
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate transmission
        run: python scripts/transmit.py

      - name: Archive transmission
        run: python scripts/archive.py

      - name: Commit & push
        run: |
          git config user.name "opus-delta[bot]"
          git config user.email "research@opusdelta.io"
          git add README.md transmissions/
          git diff --cached --quiet || git commit -m "◈ transmission · cycle $(python3 -c 'import datetime; print((datetime.datetime.utcnow().date() - datetime.date(2026,1,1)).days)')"
          git push
